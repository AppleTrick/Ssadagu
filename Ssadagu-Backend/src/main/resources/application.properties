spring.application.name=ssadagu
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
# JWT Key (최소 256bit - 32글자 이상의 Secret Key를 환경변수에서 주입받음)
jwt.secret=${JWT_SECRET}

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# SSAFY 금융망 API 설정
ssafy.api.base-url=https://finopenapi.ssafy.io/ssafy/api/v1
ssafy.api.institution-code=00100
ssafy.api.fintech-app-no=001
ssafy.api.key=${SSAFY_API_KEY}
ssafy.api.user-key=${SSAFY_API_USER_KEY}

# AWS S3 / MinIO Settings
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.region.static=${AWS_REGION}
spring.cloud.aws.s3.bucket=${S3_BUCKET_NAME}
spring.cloud.aws.s3.endpoint=${S3_ENDPOINT:}
s3.public.base-url=${S3_PUBLIC_BASE_URL}
# Maximum upload file size (Optional)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Groq API Settings (AI Metadata Generation)
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model.primary=${GROQ_MODEL_PRIMARY:groq/compound}
groq.model.vision=${GROQ_MODEL_VISION:meta-llama/llama-4-scout-17b-16e-instruct}

# AI Provider 전환 (groq | claude) - Groq rate limit 이슈로 임시 테스트용
ai.provider=${AI_PROVIDER:groq}
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=${ANTHROPIC_API_URL:https://api.anthropic.com/v1/messages}
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

# Proxy Forwarding
server.forward-headers-strategy=native
