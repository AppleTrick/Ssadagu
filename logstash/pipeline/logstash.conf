input {
  tcp {
    port => 5000
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

filter {
  if [container][name] =~ "backend" {
    mutate { add_field => { "service_type" => "backend" } }
  } else if [container][name] =~ "frontend" {
    mutate { add_field => { "service_type" => "frontend" } }
  } else if [container][name] =~ "nginx" {
    mutate { add_field => { "service_type" => "nginx" } }
  } else if [container][name] =~ "jenkins" {
    mutate { add_field => { "service_type" => "jenkins" } }
  }
  
  if ![service_type] and [port] == 5000 {
    mutate { add_field => { "service_type" => "backend" } }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ssadagu-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
